services:
  postgres-airflow:
    image: postgres:15-alpine
    container_name: sports-postgres-airflow
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_AIRFLOW_USER}
      POSTGRES_PASSWORD: ${POSTGRES_AIRFLOW_PASSWORD}
      POSTGRES_DB: ${POSTGRES_AIRFLOW_DB}
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_AIRFLOW_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sports-network

  postgres-dwh:
    image: postgres:15-alpine
    container_name: sports-postgres-dwh
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_DWH_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DWH_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DWH_DB}
    volumes:
      - postgres_dwh_data:/var/lib/postgresql/data
      - ./db/init_dwh.sql:/docker-entrypoint-initdb.d/01_init_dwh.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_DWH_USER} -d ${POSTGRES_DWH_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sports-network

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: sports-airflow-init
    env_file: .env
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password ${AIRFLOW_ADMIN_PASSWORD:-admin} --firstname Admin --lastname Sports --role Admin --email admin@example.com || true
      "
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_AIRFLOW_USER}:${POSTGRES_AIRFLOW_PASSWORD}@postgres-airflow:5432/${POSTGRES_AIRFLOW_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    depends_on:
      postgres-airflow:
        condition: service_healthy
    networks:
      - sports-network

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: sports-airflow-scheduler
    command: airflow scheduler
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_AIRFLOW_USER}:${POSTGRES_AIRFLOW_PASSWORD}@postgres-airflow:5432/${POSTGRES_AIRFLOW_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW_CONN_POSTGRES_DWH: postgres://${POSTGRES_DWH_USER}:${POSTGRES_DWH_PASSWORD}@postgres-dwh:5432/${POSTGRES_DWH_DB}
      API_FOOTBALL_LEAGUE_IDS: ${API_FOOTBALL_LEAGUE_IDS:-}
      APIFOOTBALL_API_KEY: ${APIFOOTBALL_API_KEY:-}
      API_FOOTBALL_LEAGUE_ID: ${API_FOOTBALL_LEAGUE_ID:-}
      API_FOOTBALL_SEASON: ${API_FOOTBALL_SEASON:-2024}
      API_FOOTBALL_NEXT_FIXTURES: ${API_FOOTBALL_NEXT_FIXTURES:-0}
      PYTHONPATH: /opt/airflow/src
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
      - ./src:/opt/airflow/src
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-airflow:
        condition: service_healthy
      postgres-dwh:
        condition: service_healthy
    networks:
      - sports-network

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: sports-airflow-webserver
    command: airflow webserver
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_AIRFLOW_USER}:${POSTGRES_AIRFLOW_PASSWORD}@postgres-airflow:5432/${POSTGRES_AIRFLOW_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW_CONN_POSTGRES_DWH: postgres://${POSTGRES_DWH_USER}:${POSTGRES_DWH_PASSWORD}@postgres-dwh:5432/${POSTGRES_DWH_DB}
      API_FOOTBALL_LEAGUE_IDS: ${API_FOOTBALL_LEAGUE_IDS:-}
      APIFOOTBALL_API_KEY: ${APIFOOTBALL_API_KEY:-}
      API_FOOTBALL_LEAGUE_ID: ${API_FOOTBALL_LEAGUE_ID:-}
      API_FOOTBALL_SEASON: ${API_FOOTBALL_SEASON:-2024}
      API_FOOTBALL_NEXT_FIXTURES: ${API_FOOTBALL_NEXT_FIXTURES:-0}
      PYTHONPATH: /opt/airflow/src
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
      - ./src:/opt/airflow/src
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-scheduler:
        condition: service_started
      postgres-airflow:
        condition: service_healthy
      postgres-dwh:
        condition: service_healthy
    networks:
      - sports-network

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: sports-streamlit
    ports:
      - "8501:8501"
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      PYTHONPATH: /app/src
      APIFOOTBALL_API_KEY: ${APIFOOTBALL_API_KEY:-}
      API_FOOTBALL_LEAGUE_ID: ${API_FOOTBALL_LEAGUE_ID:-}
      API_FOOTBALL_LEAGUE_IDS: ${API_FOOTBALL_LEAGUE_IDS:-}
      API_FOOTBALL_SEASON: ${API_FOOTBALL_SEASON:-2024}
      API_FOOTBALL_NEXT_FIXTURES: ${API_FOOTBALL_NEXT_FIXTURES:-0}
    volumes:
      - ./data:/app/data
    depends_on:
      postgres-dwh:
        condition: service_healthy
    networks:
      - sports-network
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    container_name: sports-metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data
    networks:
      - sports-network

networks:
  sports-network:
    driver: bridge

volumes:
  postgres_airflow_data:
  postgres_dwh_data:
  metabase_data:
